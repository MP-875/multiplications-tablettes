<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Entraînement Multiplications</title>

<style>

body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#f4f4f4;
    margin-top:30px;
}

h1{
    color:#333;
}

#buttons{
    margin:20px;
}

.levelButton{
    padding:12px 18px;
    margin:5px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

.levelButton:hover{
    background:#45a049;
}

#exercise{
    margin-top:30px;
}

#question{
    font-size:50px;
    margin-bottom:25px;
}

input{
    width:80px;
    font-size:30px;
    text-align:center;
    margin:10px;
}

#validateButton{
    padding:12px 25px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:white;
    cursor:pointer;
}

#validateButton:hover{
    background:#1976D2;
}

#feedback{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
}

#score{
    margin-top:40px;
    font-size:38px;
    color:blue;
}

</style>
</head>

<body>

<h1>Entraînement aux multiplications</h1>

<p>Choisis une limite :</p>

<div id="buttons"></div>

<div id="exercise" style="display:none;">

    <div id="question"></div>

    <input type="number" id="aInput" placeholder="a">

    ×

    <input type="number" id="bInput" placeholder="b">

    <br><br>

    <button id="validateButton" onclick="checkAnswer()">
        Valider
    </button>

    <div id="feedback"></div>

</div>

<div id="score"></div>

<script>

/* ---------------- VARIABLES ---------------- */

let maxNumber = 10;

let currentProduct = 0;

let currentQuestion = 0;

const maxQuestions = 30;

let score = 0;

let attempts = 0;


/* ---------------- BOUTONS 1 → 15 ---------------- */

for(let i = 1; i <= 15; i++){

    let btn = document.createElement("button");

    btn.innerText = i;

    btn.className = "levelButton";

    btn.onclick = function(){
        startGame(i);
    };

    document.getElementById("buttons")
        .appendChild(btn);
}


/* ---------------- DÉBUT PARTIE ---------------- */

function startGame(n){

    maxNumber = n;

    currentQuestion = 0;

    score = 0;

    document.getElementById("score").innerHTML = "";

    nextQuestion();
}


/* ---------------- QUESTION SUIVANTE ---------------- */

function nextQuestion(){

    if(currentQuestion >= maxQuestions){

        endGame();

        return;
    }

    attempts = 0;

    let a =
        Math.floor(Math.random() * maxNumber) + 1;

    let b =
        Math.floor(Math.random() * maxNumber) + 1;

    currentProduct = a * b;

    document.getElementById("exercise")
        .style.display = "block";

    document.getElementById("question")
        .innerHTML =
        "Question "
        + (currentQuestion + 1)
        + " / 30 : "
        + currentProduct;

    document.getElementById("aInput").value = "";

    document.getElementById("bInput").value = "";

    document.getElementById("feedback").innerHTML = "";

    currentQuestion++;
}


/* ---------------- VÉRIFICATION ---------------- */

function checkAnswer(){

    let a =
        parseInt(
            document.getElementById("aInput").value
        );

    let b =
        parseInt(
            document.getElementById("bInput").value
        );

    attempts++;

    let correct = false;

    if(
        !isNaN(a) &&
        !isNaN(b) &&
        a >= 1 &&
        b >= 1 &&
        a <= maxNumber &&
        b <= maxNumber &&
        a * b === currentProduct
    ){
        correct = true;
    }

    if(correct){

        score++;

        document.getElementById("feedback")
            .innerHTML = "✅ Correct !";

        setTimeout(nextQuestion,1000);

    }else{

        if(attempts >= 2){

            document.getElementById("feedback")
                .innerHTML =
                "❌ Faux.";

            setTimeout(nextQuestion,1500);

        }else{

            document.getElementById("feedback")
                .innerHTML =
                "❌ Essaie encore.";
        }
    }
}


/* ---------------- FIN ---------------- */

function endGame(){

    document.getElementById("exercise")
        .style.display = "none";

    document.getElementById("score")
        .innerHTML =
        "🎉 Score final : "
        + score
        + " / "
        + maxQuestions;
}

</script>

</body>
</html>
